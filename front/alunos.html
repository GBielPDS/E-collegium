<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Alunos da Turma</title>
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Alunos da Turma</h2>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle" id="tabelaAlunos">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Nota 1</th>
                        <th>Nota 2</th>
                        <th>Nota 3</th>
                        <th>Nota 4</th>
                        <th>Nota Final</th>
                        <th class="text-center">
                            Ações
                            <button class="btn btn-success btn-sm ms-2 btn-add-aluno">+</button>
                        </th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

</div>

<script src="alunos.js"></script>
</body>
</html>
