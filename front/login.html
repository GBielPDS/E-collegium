<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login_style.css">
    <title>Login</title>
</head>

<body class="d-flex align-items-center justify-content-center vh-100 text-light">

<div class="container" style="max-width: 420px;">

    <div class="card bg-dark shadow-lg p-4">

        <h3 id="titulo" class="text-center mb-4">Login</h3>

        <!-- LOGIN -->
        <div id="formLogin">

            <div class="mb-3">
                <input type="email" id="loginEmail" class="form-control"
                       placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" id="loginSenha" class="form-control"
                       placeholder="Senha">
            </div>

            <div class="d-grid">
                <button class="btn btn-success"
                        onclick="login()">
                    Entrar
                </button>
            </div>

        </div>

        <!-- CADASTRO -->
        <div id="formCadastro" style="display:none;">

            <div class="mb-3">
                <input type="text" id="cadNome" class="form-control"
                       placeholder="Nome">
            </div>

            <div class="mb-3">
                <input type="email" id="cadEmail" class="form-control"
                       placeholder="Email">
            </div>

            <div class="mb-3">
                <input type="password" id="cadSenha" class="form-control"
                       placeholder="Senha">
            </div>

            <div class="d-grid">
                <button class="btn btn-primary"
                        onclick="cadastrar()">
                    Cadastrar
                </button>
            </div>

        </div>

        <div class="text-center mt-3 link text-info"
             onclick="alternar()">
            <span id="textoAlternar">
                Não tem conta? Cadastre-se
            </span>
        </div>

    </div>

</div>

<script src="login.js"></script>
</body>
</html>
