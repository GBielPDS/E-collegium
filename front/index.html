<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Document</title>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Lista de Turmas</h2>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover align-middle" id="tabelaTurmas">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Escola</th>
                        <th>Nota Aprovação</th>
                        <th>Nota Recuperação</th>
                        <th>Nota Reprovação</th>
                        <th class="text-center">
                            Ações
                            <button class="btn btn-success btn-sm ms-2" onclick="adicionarTurma()">+</button>
                        </th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

        </div>
    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

<script src="index.js"></script>

</html>
