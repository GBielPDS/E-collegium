<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>

    <h1>Lista de Turmas do Professor</h1>

    <input type="number" id="professorId" placeholder="Digite o ID do professor">
    <button onclick="buscarTurmas()">Buscar</button>

    <table id="tabelaTurmas">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Escola</th>
                <th>Nota Aprovação</th>
                <th>Nota Recuperação</th>
                <th>Nota Reprovação</th>
                <th>
                    Ações
                    <button class="btn-add" onclick="adicionarTurma()">+</button>
                </th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

</body>

<script src="index.js"></script>

</html>
